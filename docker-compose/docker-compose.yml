services:

  # --- Base de datos relacional (Postgres) -------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditoria}
      POSTGRES_USER: ${POSTGRES_USER:-auditoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditoria}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditoria} -d ${POSTGRES_DB:-auditoria}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Modelo de IA local (Ollama + qwen2.5-coder:7b pre-pulled) --------
  ollama:
    build: ./Ollama_servicio
    ports:
      - "11434:11434"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  # --- Microservicio Python (inferencia / IA) ---------------------------
  microservicio_inferencia_analisis:
    build: ./Microservicio_inferencia_analisis
    ports:
      - "5000:5000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    depends_on:
      ollama:
        condition: service_healthy

  # --- Microservicio Java (gestion / persistencia / API) ----------------
  microservicio_gestion_persistencia:
    build: ./Microservicio_gestion_persistencia
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-auditoria}
      POSTGRES_USER: ${POSTGRES_USER:-auditoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditoria}
      PYTHON_SERVICE_URL: http://microservicio_inferencia_analisis:5000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-cambiar-en-prod-este-secreto-tiene-mas-de-32-bytes-ok}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      microservicio_inferencia_analisis:
        condition: service_started

  # --- Frontend (React buildeado, servido por nginx) --------------------
  interfaz_usuario:
    build:
      context: ./Interfaz_usuario
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:80"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      microservicio_gestion_persistencia:
        condition: service_started

volumes:
  postgres_data:
  ollama_data:
