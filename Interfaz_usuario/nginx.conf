server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Soporte SPA: cualquier ruta que no corresponda a un archivo real
    # devuelve index.html para que React Router maneje la navegacion.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo de assets versionados por Vite (hashes en el nombre).
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Mensaje claro si Nginx no encuentra index.html (caso build mal hecho).
    error_page 404 /index.html;
}
