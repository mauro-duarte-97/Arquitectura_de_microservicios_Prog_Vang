services:

  # interfaz_usuario:
  #   build: ./Interfaz_usuario
  #   ports:
  #     - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auditoria}
      POSTGRES_USER: ${POSTGRES_USER:-auditoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditoria}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditoria} -d ${POSTGRES_DB:-auditoria}"]
      interval: 5s
      timeout: 5s
      retries: 10

  microservicio_gestion_persistencia:
    build: ./Microservicio_gestion_persistencia
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-auditoria}
      POSTGRES_USER: ${POSTGRES_USER:-auditoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditoria}
      PYTHON_SERVICE_URL: http://microservicio_inferencia_analisis:5000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-cambiar-en-prod-este-secreto-tiene-mas-de-32-bytes-ok}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
    depends_on:
      postgres:
        condition: service_healthy
      microservicio_inferencia_analisis:
        condition: service_started

  microservicio_inferencia_analisis:
    build: ./Microservicio_inferencia_analisis
    ports:
      - "5000:5000"
    environment:
      # En Docker, "localhost" es el propio contenedor.
      # host.docker.internal apunta al host (donde corre Ollama).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2}
    extra_hosts:
      # Necesario en Linux; en Windows/Mac Docker Desktop ya lo provee.
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
