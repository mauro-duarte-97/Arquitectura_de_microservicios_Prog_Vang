spring.application.name=gestion
server.port=8080

# --- Integraci\u00f3n con microservicio Python ---
python.service.base-url=${PYTHON_SERVICE_URL:http://localhost:5000}

# --- Manejo de errores ---
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

# --- Datasource PostgreSQL ---
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:auditoria}
spring.datasource.username=${POSTGRES_USER:auditoria}
spring.datasource.password=${POSTGRES_PASSWORD:auditoria}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# 'validate' porque Flyway gestiona el esquema; Hibernate solo verifica que coincida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JWT ---
# IMPORTANTE: en producci\u00f3n setear JWT_SECRET por variable de entorno con al menos 32 bytes.
app.jwt.secret=${JWT_SECRET:dev-secret-cambiar-en-prod-este-secreto-tiene-mas-de-32-bytes-ok}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.jwt.issuer=auditoria-codigo-java

# --- CORS (frontend en desarrollo) ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
